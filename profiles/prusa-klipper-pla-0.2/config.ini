# PrusaSlicer profile bundle — Klipper / PLA / 0.2mm layer.
#
# This is a minimal, verified-sliceable config (2026-06-30, PrusaSlicer 2.9.2).
# Replace with a real export from your printer: PrusaSlicer GUI →
#   File → Export → Export Config  (saves a complete config.ini)
# then drop it here as config.ini. The adapter loads config.ini if present,
# otherwise every *.ini in this directory (alphabetical) — see plugins/slicers/prusa.
#
# `gcode_flavor = klipper` makes the output Moonraker-compatible (the moonraker
# transport's acceptsFlavors includes "klipper").

# ── printer ──
nozzle_diameter = 0.4
bed_shape = 0x0,250x0,250x250,0x250
max_print_height = 250
gcode_flavor = klipper

# ── filament (PLA) ──
filament_diameter = 1.75
temperature = 200
first_layer_temperature = 210
bed_temperature = 60
first_layer_bed_temperature = 60

# ── process (0.2mm quality) ──
layer_height = 0.2
first_layer_height = 0.2
perimeters = 2
top_solid_layers = 4
bottom_solid_layers = 3
fill_density = 15%
