# PrusaSlicer profile bundle — Marlin / PLA / 0.2mm layer.
#
# Minimal verified-sliceable config (2026-06-30, PrusaSlicer 2.9.2). Replace with a
# real GUI export (File → Export → Export Config) for your printer.
#
# `gcode_flavor = marlin` for classic Marlin firmware. NOTE: a Station using this
# profile must bind a transport whose acceptsFlavors includes "marlin"; the bundled
# moonraker/elegoo transports declare ["klipper","marlin"] in the api capability view.

# ── printer ──
nozzle_diameter = 0.4
bed_shape = 0x0,220x0,220x220,0x220
max_print_height = 250
gcode_flavor = marlin

# ── filament (PLA) ──
filament_diameter = 1.75
temperature = 200
first_layer_temperature = 210
bed_temperature = 60
first_layer_bed_temperature = 60

# ── process (0.2mm quality) ──
layer_height = 0.2
first_layer_height = 0.2
perimeters = 2
top_solid_layers = 4
bottom_solid_layers = 3
fill_density = 15%
