name: Release images

# Build the three service images (api / web / worker) and publish multi-arch
# (amd64 + arm64) manifests to GHCR. Triggered by a v* tag (the release cut) or
# manually. Native runners per arch (no QEMU) — the worker downloads + extracts
# the OpenSCAD nightly and OrcaSlicer AppImages and apt-installs the GL/GTK stack,
# which is too heavy to emulate reliably. Each (service, arch) pushes an untagged
# image by digest; a per-service merge job stitches the two digests into one
# multi-arch tag. Auth uses the built-in GITHUB_TOKEN — no secrets to manage.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Cancel an in-progress run for the same ref if a newer one starts.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Per-(service, arch) build, pushed to GHCR by digest (no tag yet) ──────────
  build:
    name: build ${{ matrix.service }} (${{ matrix.platform.arch }})
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [api, web, worker]
        platform:
          - { name: linux/amd64, arch: amd64, runner: ubuntu-24.04 }
          - { name: linux/arm64, arch: arm64, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive # worker bakes in the scad/ gridfinity lib (COPY . .)

      # GHCR requires a lowercase image path; the owner (OnlyOneByte) is mixed-case.
      - name: Compute image name
        run: echo "REGISTRY_IMAGE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/conveyor-${{ matrix.service }}" >> "$GITHUB_ENV"

      - name: Docker metadata (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/${{ matrix.service }}/Dockerfile
          platforms: ${{ matrix.platform.name }}
          labels: ${{ steps.meta.outputs.labels }}
          # worker resolves LATEST OpenSCAD/Orca at build time (Angelo: track-latest,
          # don't pin); ORCA_ENABLE defaults to `auto` in the Dockerfile so the real
          # engines are baked in — unlike ci.yml which disables Orca for a fast gate.
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.service }}-${{ matrix.platform.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}-${{ matrix.platform.arch }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.service }}-${{ matrix.platform.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Per-service: merge the two arch digests into one multi-arch tag ───────────
  merge:
    name: publish ${{ matrix.service }}
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [api, web, worker]
    steps:
      - name: Compute image name
        run: echo "REGISTRY_IMAGE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/conveyor-${{ matrix.service }}" >> "$GITHUB_ENV"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-${{ matrix.service }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          # v1.2.3 -> :1.2.3 + :1.2 + :latest + :sha-<short>. A manual run on a
          # branch gets only :sha-<short> (semver/latest disabled off-tag) so it
          # never clobbers the release :latest.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,format=short

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)

      - name: Inspect published image
        run: docker buildx imagetools inspect "${{ env.REGISTRY_IMAGE }}:${{ steps.meta.outputs.version }}"
